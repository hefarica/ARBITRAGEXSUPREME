# ================================
# ArbitrageX Supreme V3.0 - Nginx Configuration
# Optimizado para ultra-baja latencia
# ================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    # ================================
    # Configuración Base
    # ================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Optimizaciones de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 1000;
    
    # Buffers optimizados para baja latencia
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;
    
    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # Logs optimizados
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main buffer=16k flush=2s;
    
    # Rate limiting para protección DDoS
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=50r/s;
    
    # ================================
    # Upstream Backends
    # ================================
    
    # Backend principal ArbitrageX
    upstream arbitragex_backend {
        least_conn;
        server arbitragex-backend:8080 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }
    
    # WebSocket backend
    upstream arbitragex_websocket {
        ip_hash;
        server arbitragex-backend:8081 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # Métricas backend
    upstream arbitragex_metrics {
        server arbitragex-backend:9090 max_fails=1 fail_timeout=10s;
    }
    
    # ================================
    # Configuración SSL/TLS
    # ================================
    
    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 24h;
    ssl_session_tickets off;
    
    # SSL protocols y ciphers modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # ================================
    # Servidor Principal HTTP/HTTPS
    # ================================
    
    server {
        listen 80;
        server_name _;
        
        # Redireccionar HTTP a HTTPS (comentar si no usas SSL)
        # return 301 https://$server_name$request_uri;
        
        # Health check básico
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # API ArbitrageX
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://arbitragex_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts optimizados para baja latencia
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
            
            # Headers de performance
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Response-Time $upstream_response_time always;
        }
        
        # WebSocket para tiempo real
        location /ws/ {
            limit_req zone=websocket burst=20 nodelay;
            
            proxy_pass http://arbitragex_websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Configuración WebSocket
            proxy_buffers 8 32k;
            proxy_buffer_size 64k;
            proxy_busy_buffers_size 64k;
            proxy_temp_file_write_size 64k;
            
            # Timeouts para WebSocket
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 5s;
        }
        
        # Métricas Prometheus
        location /metrics {
            # Restringir acceso a métricas
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://arbitragex_metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Health checks del backend
        location /health {
            access_log off;
            proxy_pass http://arbitragex_backend;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
        }
        
        # Archivos estáticos del dashboard (cuando esté integrado)
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
    
    # ================================
    # Servidor HTTPS (SSL)
    # ================================
    
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     
    #     # Certificados SSL
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     
    #     # Incluir configuraciones de location del servidor HTTP
    #     include /etc/nginx/conf.d/locations.conf;
    # }
    
    # ================================
    # Configuración de Monitoreo
    # ================================
    
    # Servidor para métricas internas de Nginx
    server {
        listen 8090;
        server_name localhost;
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.20.0.0/16;  # Docker network
            deny all;
        }
    }
}