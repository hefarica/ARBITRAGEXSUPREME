# ================================
# ArbitrageX Supreme V3.0 Frontend - Nginx Configuration
# Configuración optimizada para SPA React
# ================================

server {
    listen 3000;
    server_name localhost;
    
    # Directorio raíz del build
    root /usr/share/nginx/html;
    index index.html;
    
    # Configuración para SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Headers de seguridad
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # CSP para dashboard de arbitraje
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' ws: wss: https:; frame-ancestors 'none';" always;
    }
    
    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Compresión para assets
        gzip on;
        gzip_vary on;
        gzip_types
            application/javascript
            text/css
            image/svg+xml
            application/font-woff
            application/font-woff2;
    }
    
    # API proxy hacia backend (si es necesario)
    location /api/ {
        # Configurar proxy_pass si el frontend necesita proxy al backend
        # proxy_pass http://arbitragex-backend:8080;
        
        # Por ahora, retornar 503 para indicar que debe usar directamente el backend
        return 503 "Use direct backend connection";
    }
    
    # WebSocket proxy (si es necesario)
    location /ws/ {
        # Configurar proxy_pass para WebSocket si es necesario
        # proxy_pass http://arbitragex-backend:8081;
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
        
        # Por ahora, retornar 503 para indicar que debe usar directamente el backend
        return 503 "Use direct WebSocket connection";
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Logs optimizados
    error_log /var/log/nginx/frontend_error.log warn;
    access_log /var/log/nginx/frontend_access.log;
    
    # Configuración de compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss;
}