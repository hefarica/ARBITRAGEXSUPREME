# ================================
# ArbitrageX Supreme V3.0 - Production
# Docker Compose para Contabo VPS
# ================================

version: '3.8'

services:
  # ================================
  # Backend Principal - Rust Engine
  # ================================
  arbitragex-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: arbitragex-supreme-backend
    restart: unless-stopped
    ports:
      - "8080:8080"    # API REST Principal
      - "8081:8081"    # WebSocket Real-time
      - "9090:9090"    # Métricas Prometheus
    networks:
      - arbitragex-network
    depends_on:
      - postgres
      - redis
      - anvil-real
    environment:
      - RUST_LOG=info
      - ARBITRAGEX_ENV=production
      - DATABASE_URL=postgresql://arbitragex:${POSTGRES_PASSWORD}@postgres:5432/arbitragex_prod
      - REDIS_URL=redis://redis:6379/0
      - ANVIL_REAL_URL=http://anvil-real:8545
      - FLASH_LOAN_PROVIDERS=${FLASH_LOAN_PROVIDERS}
      - BLOCKCHAIN_RPCS=${BLOCKCHAIN_RPCS}
      - REAL_ONLY_MODE=true
      - MAX_LATENCY_MS=200
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - arbitragex-config:/app/config
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # ================================
  # Anvil-Real Simulation Engine
  # ================================
  anvil-real:
    image: foundry:latest
    container_name: arbitragex-anvil-real
    restart: unless-stopped
    ports:
      - "8545:8545"
    networks:
      - arbitragex-network
    command: >
      anvil
      --host 0.0.0.0
      --port 8545
      --fork-url ${MAINNET_RPC_URL}
      --fork-block-number latest
      --gas-limit 30000000
      --gas-price 1000000000
      --base-fee 1000000000
      --block-time 1
      --accounts 10
      --balance 10000
      --mnemonic "test test test test test test test test test test test junk"
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
      - RUST_LOG=anvil=info
    volumes:
      - anvil-data:/app/data

  # ================================
  # Base de Datos PostgreSQL
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: arbitragex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - arbitragex-network
    environment:
      - POSTGRES_DB=arbitragex_prod
      - POSTGRES_USER=arbitragex
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ================================
  # Cache Redis
  # ================================
  redis:
    image: redis:7-alpine
    container_name: arbitragex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - arbitragex-network
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ================================
  # Nginx Reverse Proxy
  # ================================
  nginx:
    image: nginx:1.25-alpine
    container_name: arbitragex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - arbitragex-network
    depends_on:
      - arbitragex-backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/certs:ro
      - nginx-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ================================
  # Monitoreo Prometheus
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: arbitragex-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    networks:
      - arbitragex-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  # ================================
  # Grafana Dashboard
  # ================================
  grafana:
    image: grafana/grafana:latest
    container_name: arbitragex-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - arbitragex-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning

# ================================
# Redes y Volúmenes
# ================================
networks:
  arbitragex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  anvil-data:
    driver: local
  arbitragex-config:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local