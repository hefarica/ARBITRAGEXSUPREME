# docker-compose.optimized.yml
# ArbitrageX Supreme V3.0 - Configuración Optimizada ($45/mes)
# Ingenio Pichichi S.A. - Sistema de Trading DeFi Ultra Performance

version: '3.8'

services:
  # 🔷 Nodo Ethereum local (Geth) - Reemplaza Infura/Alchemy
  geth-node:
    image: ethereum/client-go:v1.13.6
    container_name: arbitragex-geth
    command: >
      --syncmode snap
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api eth,net,web3,txpool
      --http.corsdomain "*"
      --ws
      --ws.addr 0.0.0.0
      --ws.port 8546
      --ws.api eth,net,web3,txpool
      --ws.origins "*"
      --cache 4096
      --rpc.allow-unprotected-txs
      --maxpeers 50
      --verbosity 3
    ports:
      - "8545:8545"  # HTTP RPC
      - "8546:8546"  # WebSocket RPC
      - "30303:30303" # P2P
    volumes:
      - ./data/geth:/root/.ethereum
      - ./config/geth:/config
    restart: unless-stopped
    networks:
      - arbitragex-net
    environment:
      - GETH_CACHE=4096
      - GETH_MAXPEERS=50
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 🧠 Redis (caché de precios y mempool) - Performance crítica
  redis-cache:
    image: redis:7-alpine
    container_name: arbitragex-redis
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped
    networks:
      - arbitragex-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 🗄️ PostgreSQL (almacenamiento principal)
  postgres-db:
    image: postgres:15-alpine
    container_name: arbitragex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: arbitragex
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./sql/schema:/docker-entrypoint-initdb.d
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    restart: unless-stopped
    networks:
      - arbitragex-net
    command: >
      postgres 
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d arbitragex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⏳ Temporal (orquestador de workflows MEV)
  temporal-server:
    image: temporalio/auto-setup:1.21
    container_name: arbitragex-temporal
    environment:
      - NUM_HISTORY_SHARDS=1
      - LOG_LEVEL=info
      - DB_ENGINE=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_PRX=postgres://
      - POSTGRES_SEEDS=postgres-db:5432
      - POSTGRES_DBNAME=temporal
      - TEMPORAL_BROADCAST_ADDRESS=0.0.0.0
    ports:
      - "7233:7233" # gRPC
      - "8088:8088" # Web UI
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arbitragex-net
    volumes:
      - ./config/temporal:/etc/temporal/config
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 🖼️ Temporal UI
  temporal-ui:
    image: temporalio/ui:v2.19
    container_name: arbitragex-temporal-ui
    environment:
      - TEMPORAL_GRPC_ENDPOINT=temporal-server:7233
      - TEMPORAL_PERMIT_WRITE_API=true
    ports:
      - "8080:8080"
    depends_on:
      temporal-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arbitragex-net

  # 📊 The Graph Node (reemplaza Dune Analytics)
  graph-node:
    image: graphprotocol/graph-node:v0.32.0
    container_name: arbitragex-graph
    environment:
      postgres_host: postgres-db
      postgres_user: ${POSTGRES_USER}
      postgres_pass: ${POSTGRES_PASSWORD}
      postgres_db: graph-node
      ipfs: https://api.thegraph.com/ipfs/
      ethereum: mainnet:http://geth-node:8545
      GRAPH_LOG: info
      RUST_LOG: info
    ports:
      - "8000:8000"  # GraphQL HTTP
      - "8001:8001"  # WebSocket
      - "8020:8020"  # JSON-RPC admin
      - "8030:8030"  # Subgraph indexing status
    depends_on:
      - postgres-db
      - geth-node
    restart: unless-stopped
    networks:
      - arbitragex-net
    volumes:
      - ./subgraphs:/subgraphs

  # 🔧 Nginx (proxy reverso y load balancer)
  nginx-proxy:
    image: nginx:alpine
    container_name: arbitragex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - geth-node
      - redis-cache
      - temporal-server
      - graph-node
    restart: unless-stopped
    networks:
      - arbitragex-net

  # 📈 Prometheus (monitoreo de métricas)
  prometheus:
    image: prom/prometheus:latest
    container_name: arbitragex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - arbitragex-net

  # 📊 Grafana (dashboards de monitoreo)
  grafana:
    image: grafana/grafana:latest
    container_name: arbitragex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - arbitragex-net

networks:
  arbitragex-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  geth-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local