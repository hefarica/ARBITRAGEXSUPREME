# ⚡ CONFIGURACIÓN CLOUDFLARE PAGES - ArbitrageX Supreme V3.0 (Post-Migración)
# METODOLOGÍA: Ingenio Pichichi S.A. - Disciplinado, Organizado, Metodológico
# ESTADO: Arquitectura corregida - Edge computing limpio (0% código backend)

name = "arbitragex-supreme-backend"
main = "src/index.tsx"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Configuración para Cloudflare Pages (Post-Migración)
pages_build_output_dir = "./dist"

# Variables de entorno globales (Post-Migración)
[vars]
PROJECT_VERSION = "3.0.0-post-migration"
ARCHITECTURE_STATUS = "MIGRATED_SUCCESS"
EDGE_FUNCTIONS_ACTIVE = "4"
BACKEND_SEPARATION = "100_PERCENT"

[env.production]
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Variables de entorno para producción (Actualizadas)
[env.production.vars]
ENVIRONMENT = "production"
VERSION = "3.0.0"
DATA_POLICY = "REAL_DATA_ONLY"
MIGRATION_COMPLETED = "2025-09-11"
API_ENDPOINTS_ACTIVE = "true"
MATH_VALIDATION_ENABLED = "true"
RUGPULL_PROTECTION_ENABLED = "true"

# Configuración de funciones
[[env.production.placement]]
mode = "smart"

# Configuración de desarrollo (Post-Migración)
[env.development]
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.development.vars]
ENVIRONMENT = "development"
VERSION = "3.0.0-dev"
DATA_POLICY = "DEVELOPMENT_MODE"
MIGRATION_STATUS = "COMPLETED"
API_TESTING_MODE = "true"
EDGE_SERVICES_COUNT = "5"
RUST_BACKEND_SEPARATED = "true"

# Configuración de servicios Edge (Post-Migración)
[env.development.services]
# Servicios TypeScript implementados:
# - backtesting.service.ts (31KB)
# - monitoring.service.ts (16KB)  
# - notification.service.ts (18KB)
# - risk-management.service.ts (25KB)
# - wallet.service.ts (18KB)

# APIs Hono operacionales:
# - /api/math-demo (Validación matemática)
# - /api/opportunities (Estadísticas oportunidades)
# - /api/validate-token (Validación tokens)
# - / (Dashboard principal)

# Comentarios de configuración:
# NOTA: main apunta a src/index.tsx (aplicación Hono principal)
# NOTA: Backend Rust 100% migrado a ARBITRAGEX-CONTABO-BACKEND
# NOTA: 0% código .rs permanece en este repositorio Edge