# Configuración específica para Cloudflare Pages - ArbitrageX Supreme V3.0
name = "arbitragex-supreme-backend"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Directorio de salida para Pages
pages_build_output_dir = "./dist_pages"

# Variables de entorno globales
[vars]
PROJECT_VERSION = "3.0.0-post-migration"
ARCHITECTURE_STATUS = "MIGRATED_SUCCESS"
EDGE_FUNCTIONS_ACTIVE = "4"
BACKEND_SEPARATION = "100_PERCENT"

# Entorno de producción para Pages
[env.production]
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production.vars]
ENVIRONMENT = "production"
VERSION = "3.0.0"
DATA_POLICY = "REAL_DATA_ONLY"
MIGRATION_COMPLETED = "2025-09-11"
API_ENDPOINTS_ACTIVE = "true"
MATH_VALIDATION_ENABLED = "true"
RUGPULL_PROTECTION_ENABLED = "true"

# Entorno preview para Pages
[env.preview]
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.preview.vars]
ENVIRONMENT = "preview"
VERSION = "3.0.0-preview"
DATA_POLICY = "DEVELOPMENT_MODE"
MIGRATION_STATUS = "COMPLETED"
API_TESTING_MODE = "true"