name = "arbitragex-supreme-backend"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# Variables de entorno globales
[vars]
PROJECT_VERSION = "3.0.0-post-migration"
ARCHITECTURE_STATUS = "MIGRATED_SUCCESS"
EDGE_FUNCTIONS_ACTIVE = "4"

[env.production]
compatibility_date = "2024-01-01"

[env.production.vars]
ENVIRONMENT = "production"
VERSION = "3.0.0"
DATA_POLICY = "REAL_DATA_ONLY"
MIGRATION_COMPLETED = "2025-09-11"

[env.preview]
compatibility_date = "2024-01-01"

[env.preview.vars]
ENVIRONMENT = "preview"
VERSION = "3.0.0-preview"
DATA_POLICY = "DEVELOPMENT_MODE"